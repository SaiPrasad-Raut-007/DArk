<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DArk</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-container">
            <div id="timer"></div>
            <div id="inventory">
                <div id="player-health-box">
                    <div class="health-bar" id="player-health-bar"></div>
                </div>
                <div id="player-bullet-box">
                    <div class="bullet-box" id="bullet-box-1"></div>
                    <div class="bullet-box" id="bullet-box-2"></div>
                    <div class="bullet-box" id="bullet-box-3"></div>
                    <div class="bullet-box" id="bullet-box-4"></div>
                    <div class="bullet-box" id="bullet-box-5"></div>
                    <div class="bullet-box" id="bullet-box-6"></div>
                    <div class="bullet-box" id="bullet-box-7"></div>
                    <div class="bullet-box" id="bullet-box-8"></div>
                    <div class="bullet-box" id="bullet-box-9"></div>
                </div>
            </div>
            <div id="shop">
                <div id="item-list">
                    <div id="item-1" class="item"></div>
                    <div id="item-2" class="item"></div>
                    <div id="item-3" class="item"></div>
                </div>
                <div id="wallet"></div>
                <div id="buy-button">BUY</div>
            </div>
            <div id="game-menu">
                <div id="player-high-score"></div>
                <div id="resume-button">Resume</div>
            </div>
            <div id="player-indicator"></div>
            <div id="sector"></div>
            <div id="darkness-overlay"></div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>
    <script type="module" src="rendering_engine.js"></script>
</body>
</html>
